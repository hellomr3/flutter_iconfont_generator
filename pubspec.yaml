name: flutter_iconfont_generator
description: A Dart/Flutter code generator for iconfont.cn icons. Converts iconfont.cn icons to Flutter widgets with SVG rendering, supporting multi-color icons and null safety.
homepage: https://github.com/suyulin/flutter_iconfont_generator
repository: https://github.com/suyulin/flutter_iconfont_generator
issue_tracker: https://github.com/suyulin/flutter_iconfont_generator/issues
documentation: https://github.com/suyulin/flutter_iconfont_generator/blob/main/README.md

version: 1.0.3

# Platform support declarations
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

# Topics for pub.dev discoverability
topics:
  - flutter
  - icons
  - iconfont
  - svg
  - code-generation

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
  http: ^1.0.0
  xml: ^6.3.0
  path: ^1.8.3
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Flutter configuration
flutter:
  uses-material-design: true

# Example iconfont configuration (for reference)
# Add this to your project's lib/iconfont.yaml:
# sources:
#   - name: main
#     symbol_url: "//at.alicdn.com/t/font_xxx.js"
#     save_dir: "./lib/generated"
#     trim_icon_prefix: "icon"
#     default_icon_size: 18
#     null_safety: true

# Executable scripts
executables:
  iconfont_generator: iconfont_generator
